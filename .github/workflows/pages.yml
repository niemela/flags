name: Deploy flag browser to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs for new pushes.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Rebuild data/flags.json from per-flag metadata
        run: python3 tools/build_index.py

      - name: Assemble deploy artifact (site/ at root, data/ under /data/)
        run: |
          mkdir _deploy
          cp -r site/. _deploy/
          cp -r data _deploy/data

      - name: Cache-bust app.js and styles.css
        # index.html loads these by bare name, so browsers serve a stale copy
        # after a deploy. Stamp a content hash onto each reference so a changed
        # asset busts the cache while an unchanged one stays cacheable.
        run: |
          cd _deploy
          js=$(sha256sum app.js | cut -c1-8)
          css=$(sha256sum styles.css | cut -c1-8)
          sed -i "s|\"app\.js\"|\"app.js?v=$js\"|; s|\"styles\.css\"|\"styles.css?v=$css\"|" index.html
          echo "stamped app.js?v=$js, styles.css?v=$css"
          grep -nE '(app\.js|styles\.css)' index.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _deploy

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
