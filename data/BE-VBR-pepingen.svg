<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" version="1.1"
   xmlns:xlink="http://www.w3.org/1999/xlink"
   width="600" height="400" viewBox="-30 -20 60 40">

<defs>
<clipPath id="c">
  <path id="shield" d="M-10,-10 V-1 C-10,5 -6,10 0,12 C6,10 10,5 10,-1 V-10z"/>
</clipPath>
<g id="cross" transform="scale(.017)">
  <path fill="#fcdd09" d="M-160,0 L-80,5 H60 v-10 H-80 z"/>
  <path stroke="#fcdd09" stroke-width="10"
    d="M0,-60 V60 M40,-20 V20 M-20,40 H20 M-20,-40 H20"/>
</g>
</defs>

<rect fill="#000" x="-30" y="-20" width="60" height="40"/>
<rect fill="#fcdd09" x="-15" y="-20" width="30" height="40"/>
<use fill="#fff" stroke="#000" stroke-width=".25" xlink:href="#shield"/>

<g clip-path="url(#c)">
  <polygon id="gyron" fill="#000" points="6,15 0,16 0,-16 6,-15 0,0"/>
  <g id="gyron2">
    <use transform="rotate(72)" xlink:href="#gyron"/>
    <use transform="rotate(144)" xlink:href="#gyron"/>
  </g>
  <use transform="scale(1,-1)" xlink:href="#gyron2"/>
</g>

<use x="8.6" transform="rotate(-9)" xlink:href="#cross"/>
<use x="4.6" xlink:href="#cross"/>
<use x="8.3" transform="rotate(9)" xlink:href="#cross"/>
<use x="8.9" transform="rotate(63)" xlink:href="#cross"/>
<use x="5.2" transform="rotate(72)" xlink:href="#cross"/>
<use x="9.7" transform="rotate(81)" xlink:href="#cross"/>
<use x="8.7" transform="rotate(135)" xlink:href="#cross"/>
<use x="4.7" transform="rotate(144)" xlink:href="#cross"/>
<use x="8.4" transform="rotate(153)" xlink:href="#cross"/>
<use x="9.2" transform="rotate(207)" xlink:href="#cross"/>
<use x="5.3" transform="rotate(216)" xlink:href="#cross"/>
<use x="11.3" transform="rotate(225)" xlink:href="#cross"/>
<use x="8.4" transform="rotate(279)" xlink:href="#cross"/>
<use x="4.8" transform="rotate(288)" xlink:href="#cross"/>
<use x="9.5" transform="rotate(297)" xlink:href="#cross"/>

</svg>