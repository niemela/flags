<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Flag Browser</title>
  <meta name="description" content="Browse and filter flags by colour, feature, region and type.">
  <link rel="icon" type="image/svg+xml" href="data/fiav.svg">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="#" data-link="home">
      <span class="brand-mark" aria-hidden="true"></span>
      <span>Flag Browser</span>
    </a>
    <div class="header-actions">
      <input id="search" type="search" placeholder="Search by name or code…" autocomplete="off" spellcheck="false">
      <button id="random-btn" type="button" title="Show a random flag">Random</button>
      <a data-nav href="/about" title="About this dataset">About</a>
      <a id="repo-link" href="https://github.com/niemela/flags" target="_blank" rel="noopener" title="Source repository">Repo</a>
    </div>
  </header>

  <main id="app" aria-live="polite">
    <p class="loading">Loading flags…</p>
  </main>

  <footer class="site-footer">
    <a data-nav href="/about">About</a>
    <span class="dot">·</span>
    <span>Data &amp; images from the <a href="https://github.com/niemela/flags" target="_blank" rel="noopener">niemela/flags</a> repository.</span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
